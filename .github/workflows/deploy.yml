name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: image-processing-inference
  LAMBDA_FUNCTION: cat-vs-dog-inference
  S3_BUCKET: cat-vs-dog-frontend-235899055608

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Update Lambda function
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws lambda update-function-code \
            --function-name $LAMBDA_FUNCTION \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --region $AWS_REGION

      - name: Get API Gateway URL
        id: api-url
        run: |
          API_ID=$(aws apigatewayv2 get-apis --query "Items[?Name=='cat-vs-dog-api'].ApiId" --output text)
          API_URL="https://${API_ID}.execute-api.${AWS_REGION}.amazonaws.com"
          echo "url=${API_URL}" >> $GITHUB_OUTPUT

      - name: Deploy frontend to S3
        run: |
          # Replace the placeholder API URL with the real one
          API_URL="${{ steps.api-url.outputs.url }}"
          sed -i "s|__API_GATEWAY_URL__|${API_URL}|g" frontend/app.js

          # Sync frontend files to S3
          aws s3 sync frontend/ s3://$S3_BUCKET/ \
            --delete \
            --cache-control "max-age=3600"
